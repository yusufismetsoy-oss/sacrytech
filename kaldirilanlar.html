<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaldırılanlar</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #121212; color: #fff; padding: 20px; }
        .card { background: #1e1e1e; padding: 15px; margin-bottom: 10px; border-left: 4px solid #ff4d4d; border-radius: 6px; }
    </style>
</head>
<body>
    <button onclick="window.location.href='dashboard.html'" style="background:none; color:#00d2ff; margin-bottom:20px; border:none; padding:0; font-size:16px;">❮ Geri</button>
    <h2>Kaldırılan Ürünler</h2><br>
    <div id="liste"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const app = initializeApp({ apiKey: "AIzaSyA2BFK8FPamp258Uk8OR3MXvLFWRMZFOxo", projectId: "sacrytecherp-373b5" });
        const db = getFirestore(app);

        async function yukle() {
            const q = query(collection(db, "Products"), where("durum", "==", "Kaldırıldı"));
            const snap = await getDocs(q);
            const div = document.getElementById('liste');
            snap.forEach(d => {
                const u = d.data();
                div.innerHTML += `
                <div class="card">
                    <h3>${u.urunAdi}</h3>
                    <p style="color:#ff4d4d; margin-top:5px;">Sebep: ${u.kaldirmaSebebi}</p>
                    <small style="color:#aaa;">Ekleyen: ${u.ekleyen}</small>
                </div>`;
            });
        }
        yukle();
    </script>
</body>
</html>
