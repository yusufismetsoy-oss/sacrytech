<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SacryTech - Detaylı Ürün Alış</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #121212; color: #fff; padding: 20px; padding-bottom: 40px; }
        
        header { display: flex; align-items: center; margin-bottom: 20px; }
        header button { background: none; color: #00d2ff; border: none; font-size: 16px; cursor: pointer; margin-right: 15px; font-weight: bold; }
        header h2 { font-size: 20px; }

        .tabs { display: flex; background: #2c2c2c; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: #aaa; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #00d2ff; color: #121212; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; }
        
        input[type="text"], input[type="number"], select, textarea {
            width: 100%; padding: 12px; background: #2c2c2c; border: 1px solid #333; color: #fff; border-radius: 6px; outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: #00d2ff; }
        
        #kullaniciGosterge { background: #1a1a1a; color: #888; border-color: #222; cursor: not-allowed; }

        .foto-alani { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px dashed #00d2ff; margin-bottom: 15px; }
        .foto-alani input { margin-bottom: 10px; font-size: 12px; color: #aaa; }

        .check-kutu { display: flex; align-items: center; background: #1e1e1e; padding: 12px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #333; }
        .check-kutu input { width: 18px; height: 18px; margin-right: 10px; accent-color: #00d2ff; }
        .check-kutu.red { border-color: #ff4d4d; }
        .check-kutu.red input { accent-color: #ff4d4d; }

        #arizaDetayAlani { display: none; margin-top: 10px; }

        .btn-kaydet { width: 100%; padding: 15px; background: #00d2ff; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; color: #121212; }
        .btn-kaydet:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <button onclick="window.location.href='dashboard.html'">❮ Geri</button>
        <h2>Ürün Alış Ekranı</h2>
    </header>

    <div class="tabs">
        <button class="tab-btn active" id="btnTekli" onclick="kategoriDegistir('Tekli Parça')">Tekli Parça</button>
        <button class="tab-btn" id="btnNotebook" onclick="kategoriDegistir('Notebook')">Notebook</button>
    </div>

    <div class="form-group">
        <label>İşlemi Yapan</label>
        <input type="text" id="kullaniciGosterge" readonly>
    </div>

    <div class="form-group">
        <label>Ürün Kategorisi</label>
        <select id="kategori"></select>
    </div>

    <div class="form-group">
        <label>Ürün Adı (Marka / Model)</label>
        <input type="text" id="urunAdi" placeholder="Örn: MSI GTX 1660 Ti Ventus">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="form-group">
            <label>Alış Fiyatı (TL)</label>
            <input type="number" id="alisFiyati" placeholder="0">
        </div>
        <div class="form-group">
            <label>Yan Masraflar (TL)</label>
            <input type="number" id="yanMasraf" placeholder="0" value="0">
        </div>
    </div>

    <div class="foto-alani">
        <label style="color:#00d2ff; font-weight:bold; margin-bottom:10px; display:block;">📸 Ürün Fotoğrafları (3 Adet Zorunlu)</label>
        <input type="file" id="foto1" accept="image/*" capture="camera">
        <input type="file" id="foto2" accept="image/*" capture="camera">
        <input type="file" id="foto3" accept="image/*" capture="camera">
    </div>

    <div class="check-kutu">
        <input type="checkbox" id="kutuluMu">
        <label for="kutuluMu" style="color: #fff; margin:0;">Ürünün Kutusu Var</label>
    </div>

    <div class="check-kutu red">
        <input type="checkbox" id="arizaliMi" onchange="arizaKontrol()">
        <label for="arizaliMi" style="color: #ff4d4d; margin:0; font-weight:bold;">Ürün Arızalı / Kusurlu</label>
    </div>

    <div class="form-group" id="arizaDetayAlani">
        <label style="color: #ff4d4d;">Arızası / Kusuru Nedir?</label>
        <input type="text" id="arizaDetay" placeholder="Örn: Fan ses yapıyor, çizik var...">
    </div>

    <div class="form-group">
        <label>Ürün Detayları (Açıklama)</label>
        <textarea id="detaylar" rows="3" placeholder="Görsel durumu ve notlar..."></textarea>
    </div>

    <button class="btn-kaydet" id="kaydetBtn">Tüm Bilgilerle Stoka Kaydet</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Yapılandırması (Config bilgilerini buraya girin)
        const firebaseConfig = {
            apiKey: "AIzaSyA2BFK8FPamp258Uk8OR3MXvLFWRMZFOxo",
            authDomain: "sacrytecherp-373b5.firebaseapp.com",
            projectId: "sacrytecherp-373b5"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const aktifKullanici = localStorage.getItem('kullaniciAdi');
        if(!aktifKullanici) window.location.href = "index.html";
        document.getElementById('kullaniciGosterge').value = aktifKullanici;

        const katTekli = ["Ekran Kartı", "İşlemci", "Anakart", "RAM", "Kasa", "Güç Kaynağı", "SSD / HDD", "Soğutucu", "Monitör", "Klavye/Mouse", "Diğer"];
        const katNotebook = ["Oyun Bilgisayarı", "Ofis ve İş Bilgisayarı", "MacBook", "Notebook Yedek Parça"];
        let seciliTip = "Tekli Parça";

        window.kategoriDegistir = function(tip) {
            seciliTip = tip;
            document.getElementById('btnTekli').className = tip === 'Tekli Parça' ? "tab-btn active" : "tab-btn";
            document.getElementById('btnNotebook').className = tip === 'Notebook' ? "tab-btn active" : "tab-btn";
            const selectBox = document.getElementById('kategori');
            selectBox.innerHTML = "";
            let eklenecekListe = tip === 'Tekli Parça' ? katTekli : katNotebook;
            eklenecekListe.forEach(k => { selectBox.innerHTML += `<option value="${k}">${k}</option>`; });
        }
        kategoriDegistir('Tekli Parça');

        window.arizaKontrol = function() {
            const kutu = document.getElementById('arizaliMi').checked;
            document.getElementById('arizaDetayAlani').style.display = kutu ? "block" : "none";
        }

        document.getElementById('kaydetBtn').addEventListener('click', async () => {
            const kategori = document.getElementById('kategori').value;
            const urunAdi = document.getElementById('urunAdi').value.trim();
            const alisFiyati = document.getElementById('alisFiyati').value;
            const yanMasraf = document.getElementById('yanMasraf').value;
            const detaylar = document.getElementById('detaylar').value.trim();
            const f1 = document.getElementById('foto1').files[0];
            const f2 = document.getElementById('foto2').files[0];
            const f3 = document.getElementById('foto3').files[0];

            if(!urunAdi || !alisFiyati || !f1 || !f2 || !f3) {
                alert("Ürün adı, fiyat ve 3 fotoğraf zorunludur!");
                return;
            }

            const btn = document.getElementById('kaydetBtn');
            btn.innerText = "Fotoğraflar Buluta Yükleniyor...";
            btn.disabled = true;

            const imgbbKey = "7813bac71a9d40d56053539966618bd8";

            try {
                // 1. Fotoğrafları ImgBB'ye Yükle
                const fotolar = [f1, f2, f3];
                const fotoUrller = [];
                for(let f of fotolar) {
                    let formData = new FormData();
                    formData.append("image", f);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: formData });
                    const resData = await res.json();
                    if(resData.success) fotoUrller.push(resData.data.url);
                    else throw new Error("Yükleme hatası");
                }

                // 2. Firebase'e Kaydet
                await addDoc(collection(db, "Products"), {
                    urunTipi: seciliTip,
                    kategori: kategori,
                    urunAdi: urunAdi,
                    alisFiyati: Number(alisFiyati),
                    yanMasraf: Number(yanMasraf),
                    toplamMaliyet: Number(alisFiyati) + Number(yanMasraf),
                    fotolar: fotoUrller,
                    kutuDurumu: document.getElementById('kutuluMu').checked ? "Kutulu" : "Kutusuz",
                    arizaDurumu: document.getElementById('arizaliMi').checked ? "Arızalı" : "Sağlam",
                    arizaDetayi: document.getElementById('arizaDetay').value,
                    detaylar: detaylar,
                    ekleyen: aktifKullanici,
                    durum: "Stokta",
                    tarih: serverTimestamp()
                });

                alert("Ürün ve fotoğraflar başarıyla kaydedildi!");
                window.location.reload();
            } catch (error) {
                console.error(error);
                alert("Hata oluştu, tekrar deneyin.");
                btn.innerText = "Tüm Bilgilerle Stoka Kaydet";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
